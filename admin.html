<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — MSR Software Solutions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7C5CF6;
      --primary-light: #A78BFA;
      --dark: #000000;
      --dark-2: #0A0A0A;
      --dark-3: #111111;
      --dark-4: #1A1A1A;
      --card: #0D0D0D;
      --border: rgba(124,92,246,0.18);
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- LOGIN ---- */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--dark);
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(124,92,246,0.12);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo img {
      height: 54px;
      object-fit: contain;
    }

    .login-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .login-box label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .login-box input {
      width: 100%;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus {
      border-color: var(--primary);
    }

    .login-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .login-btn:hover { background: #6248d6; }

    .login-error {
      color: var(--red);
      font-size: 0.82rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* ---- ADMIN LAYOUT ---- */
    #adminPanel { display: none; }

    .admin-header {
      background: var(--dark-2);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-header-left img {
      height: 38px;
      object-fit: contain;
    }

    .admin-header-left h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary-light);
    }

    .admin-logout {
      background: rgba(239,68,68,0.12);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .admin-logout:hover { background: rgba(239,68,68,0.22); }

    .admin-body {
      padding: 36px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ---- STAT CARDS ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
    }

    .stat-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      width: fit-content;
      margin-bottom: 24px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ---- TOOLBAR ---- */
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .search-box {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 0.88rem;
      color: var(--text);
      width: 260px;
      outline: none;
    }

    .search-box:focus { border-color: var(--primary); }

    .export-btn {
      background: rgba(124,92,246,0.12);
      color: var(--primary-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .export-btn:hover { background: rgba(124,92,246,0.22); }

    .clear-btn {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.22);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .clear-btn:hover { background: rgba(239,68,68,0.2); }

    /* ---- TABLE ---- */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--dark-3);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 13px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      text-align: left;
    }

    td {
      padding: 13px 16px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(124,92,246,0.04); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-new { background: rgba(124,92,246,0.18); color: var(--primary-light); }
    .badge-read { background: rgba(100,116,139,0.18); color: var(--muted); }
    .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-contact { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-schedule { background: rgba(245,158,11,0.15); color: var(--yellow); }

    .action-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      margin-right: 4px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--primary);
      color: var(--primary-light);
    }

    .action-btn.done-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .action-btn.delete-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }

    .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    /* ---- MODAL ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      max-width: 580px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
    }

    .modal-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.85rem;
    }

    .modal-row:last-child { border-bottom: none; }

    .modal-key {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 2px;
    }

    .modal-val { color: var(--text); word-break: break-word; white-space: pre-wrap; }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-body { padding: 20px 16px; }
      td, th { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="MSR LOGO .png" alt="MSR Software Solutions" />
    </div>
    <h2 class="login-title">Admin Panel</h2>
    <p class="login-sub">Sign in to access the MSR dashboard</p>

    <label for="adminUser">Username</label>
    <input type="text" id="adminUser" placeholder="admin" autocomplete="username" />

    <label for="adminPass">Password</label>
    <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" />

    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect credentials. Please try again.</div>
  </div>
</div>

<!-- ===================== ADMIN PANEL ===================== -->
<div id="adminPanel">

  <header class="admin-header">
    <div class="admin-header-left">
      <img src="MSR LOGO .png" alt="MSR" />
      <h1>Admin Dashboard</h1>
    </div>
    <button class="admin-logout" onclick="doLogout()">Logout</button>
  </header>

  <div class="admin-body">

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">All Submissions</button>
      <button class="tab-btn" onclick="switchTab('contact', this)">Contact Forms</button>
      <button class="tab-btn" onclick="switchTab('schedule', this)">Schedule Calls</button>
    </div>

    <!-- Toolbar -->
    <div class="table-toolbar">
      <input type="text" class="search-box" id="searchBox" placeholder="Search by name, email, service…" oninput="renderTable()" />
      <div style="display:flex;gap:8px">
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Date</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Service / Topic</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Submission Detail</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'msr@2025';
  const STORAGE_KEY = 'msr_submissions';

  let currentTab = 'all';

  function doLogin() {
    const u = document.getElementById('adminUser').value.trim();
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderStats();
      renderTable();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  document.getElementById('adminPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminUser').value = '';
    document.getElementById('adminPass').value = '';
  }

  function getSubmissions() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveSubmissions(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function renderStats() {
    const all = getSubmissions();
    const contacts = all.filter(s => s.type === 'contact');
    const schedules = all.filter(s => s.type === 'schedule');
    const newCount = all.filter(s => s.status === 'new').length;

    const today = new Date().toDateString();
    const todayCount = all.filter(s => new Date(s.date).toDateString() === today).length;

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value">${all.length}</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="stat-dot" style="background:#7C5CF6"></span>Contact Forms</div>
        <div class="stat-value">${contacts.length}</div>
        <div class="stat-sub">Messages received</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="stat-dot" style="background:#f59e0b"></span>Schedule Calls</div>
        <div class="stat-value">${schedules.length}</div>
        <div class="stat-sub">Call requests</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><span class="stat-dot" style="background:#22c55e"></span>Today</div>
        <div class="stat-value">${todayCount}</div>
        <div class="stat-sub">${newCount} unread total</div>
      </div>
    `;
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const query = document.getElementById('searchBox').value.toLowerCase();
    let data = getSubmissions();

    if (currentTab !== 'all') data = data.filter(s => s.type === currentTab);

    if (query) {
      data = data.filter(s =>
        (s.firstName + ' ' + s.lastName + ' ' + s.name + ' ' + s.email + ' ' +
         s.phone + ' ' + s.service + ' ' + s.topic + ' ' + s.organization).toLowerCase().includes(query)
      );
    }

    const tbody = document.getElementById('tableBody');

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          <p>No submissions yet</p>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((s, i) => {
      const name = s.type === 'contact' ? (s.firstName + ' ' + s.lastName).trim() : (s.name || '—');
      const service = s.type === 'contact' ? (s.service || '—') : (s.topic || '—');
      const date = new Date(s.date).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
      const statusClass = s.status === 'new' ? 'badge-new' : s.status === 'done' ? 'badge-done' : 'badge-read';
      const typeClass = s.type === 'contact' ? 'badge-contact' : 'badge-schedule';

      return `<tr>
        <td style="color:var(--muted);font-size:0.75rem">${i + 1}</td>
        <td><span class="badge ${typeClass}">${s.type === 'contact' ? 'Contact' : 'Schedule'}</span></td>
        <td style="color:var(--muted);font-size:0.78rem">${date}</td>
        <td style="font-weight:600">${name || '—'}</td>
        <td style="color:var(--primary-light)">${s.email || '—'}</td>
        <td>${s.phone || '—'}</td>
        <td>${service}</td>
        <td><span class="badge ${statusClass}">${s.status}</span></td>
        <td style="white-space:nowrap">
          <button class="action-btn" onclick="viewDetail('${s.id}')">View</button>
          <button class="action-btn done-btn" onclick="markStatus('${s.id}','done')">✓ Done</button>
          <button class="action-btn delete-btn" onclick="deleteEntry('${s.id}')">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  function markStatus(id, status) {
    const data = getSubmissions();
    const entry = data.find(s => String(s.id) === String(id));
    if (entry) { entry.status = status; saveSubmissions(data); renderStats(); renderTable(); }
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    const data = getSubmissions().filter(s => String(s.id) !== String(id));
    saveSubmissions(data);
    renderStats();
    renderTable();
  }

  function viewDetail(id) {
    const data = getSubmissions();
    const s = data.find(x => String(x.id) === String(id));
    if (!s) return;

    if (s.status === 'new') markStatus(id, 'read');

    const name = s.type === 'contact' ? (s.firstName + ' ' + s.lastName).trim() : s.name;
    const rows = s.type === 'contact' ? [
      ['Type', '<span class="badge badge-contact">Contact Form</span>'],
      ['Date', new Date(s.date).toLocaleString('en-IN')],
      ['Name', name || '—'],
      ['Email', s.email || '—'],
      ['Phone', s.phone || '—'],
      ['Organization', s.organization || '—'],
      ['Service', s.service || '—'],
      ['Budget', s.budget || '—'],
      ['Message', s.message || '—'],
      ['Status', `<span class="badge badge-${s.status === 'done' ? 'done' : 'read'}">${s.status}</span>`],
    ] : [
      ['Type', '<span class="badge badge-schedule">Schedule Call</span>'],
      ['Date Submitted', new Date(s.date).toLocaleString('en-IN')],
      ['Name', s.name || '—'],
      ['Email', s.email || '—'],
      ['Phone', s.phone || '—'],
      ['Preferred Date', s.preferredDate || '—'],
      ['Preferred Time', s.preferredTime || '—'],
      ['Topic', s.topic || '—'],
      ['Status', `<span class="badge badge-${s.status === 'done' ? 'done' : 'read'}">${s.status}</span>`],
    ];

    document.getElementById('modalContent').innerHTML = rows.map(([k, v]) =>
      `<div class="modal-row"><div class="modal-key">${k}</div><div class="modal-val">${v}</div></div>`
    ).join('');

    document.getElementById('detailModal').classList.add('open');
    renderTable();
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('open');
  }

  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function exportCSV() {
    const data = getSubmissions();
    if (!data.length) { alert('No data to export.'); return; }

    const headers = ['#','Type','Date','Name','Email','Phone','Organization','Service/Topic','Budget','Message/PreferredDate','PreferredTime','Status'];
    const rows = data.map((s, i) => {
      const name = s.type === 'contact' ? (s.firstName + ' ' + s.lastName).trim() : (s.name || '');
      return [
        i+1, s.type,
        new Date(s.date).toLocaleString('en-IN'),
        name, s.email||'', s.phone||'',
        s.organization||'',
        s.service||s.topic||'',
        s.budget||'',
        s.message||s.preferredDate||'',
        s.preferredTime||'',
        s.status
      ].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',');
    });

    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'msr_submissions_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  function clearAll() {
    if (!confirm('Clear ALL submissions? This cannot be undone.')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderStats();
    renderTable();
  }
</script>
</body>
</html>
